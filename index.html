          {/* "How to play" button — clearly labelled */}
          <button onClick={()=>setShowInfo(true)}
            style={{background:"rgba(90,75,165,0.30)",border:"1px solid rgba(145,130,220,0.52)",
              color:"rgba(205,195,255,0.92)",padding:isMobile?"5px 10px":"5px 12px",
              borderRadius:4,cursor:"pointer",
              fontSize:isMobile?9:10,fontFamily:"monospace",letterSpacing:0.5,
              whiteSpace:"nowrap",fontWeight:"bold",
              boxShadow:"0 0 8px rgba(120,100,220,0.15)"}}>
            ⓘ How to play
          </button>
        </div>

        {/* Row 2 (or right side on desktop): action buttons */}
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",
          justifyContent:isMobile?"flex-start":"flex-end"}}>
          {overdueCount>0&&(
            <button onClick={()=>askConfirm(`Squish all ${overdueCount} overdue task${overdueCount>1?"s":""}?`,bulkSquishOverdue)}
              style={{background:"rgba(150,32,14,0.28)",border:"1px solid rgba(180,45,20,0.55)",
                color:"rgba(255,130,100,0.96)",padding:"5px 11px",borderRadius:4,
                cursor:"pointer",fontSize:isMobile?9:10,letterSpacing:0.5,fontFamily:"monospace",fontWeight:"bold"}}>
              💀 squish overdue
            </button>
          )}
          {[
            {label:"↓",title:"Export backup",   onClick:exportData},
            {label:"↑",title:"Import backup",   onClick:()=>askConfirm("Import will replace all current data. Continue?",()=>importRef.current?.click())},
          ].map(({label,title,onClick})=>(
            <button key={label} onClick={onClick} title={title}
              style={{background:"rgba(45,68,135,0.28)",border:"1px solid rgba(70,105,185,0.45)",
                color:"rgba(165,195,255,0.88)",padding:"5px 10px",borderRadius:4,
                cursor:"pointer",fontSize:14,lineHeight:1,fontWeight:"bold"}}>
              {label}
            </button>
          ))}
          {[
            ["task",    "+ task",    "rgba(88,78,158,0.28)","rgba(115,105,195,0.52)","#c4bcf8"],
            ["project","+ project","rgba(48,88,158,0.28)","rgba(65,118,195,0.52)","#a0c8f8"],
          ].map(([key,lbl,bg,border,col])=>(
            <button key={key}
              onClick={()=>{setShowForm(f=>f===key?null:key);setPopup(null);setEditItem(null);setActiveProj(null);}}
              style={{background:showForm===key?"rgba(125,32,14,0.28)":bg,
                border:`1px solid ${showForm===key?"rgba(155,42,20,0.55)":border}`,
                color:showForm===key?"#e07868":col,
                padding:"5px 13px",borderRadius:4,cursor:"pointer",
                fontSize:isMobile?10:11,letterSpacing:0.5,fontFamily:"monospace",fontWeight:"bold"}}>
              {showForm===key?"✕":lbl}
            </button>
          ))}
        </div>
      </div>

      {/* ── Subtask panel ──────────────────────────────────────────────────── */}
      {activeProjObj&&(
        <div style={{position:"absolute",top:isMobile?90:52,left:10,
          background:"rgba(5,4,22,0.96)",border:"1px solid rgba(82,118,192,0.34)",
          borderRadius:6,padding:"10px 12px",zIndex:25,
          maxWidth:isMobile?"calc(100vw - 20px)":"54%",
          maxHeight:"40vh",overflowY:"auto",
          boxShadow:"0 2px 22px rgba(0,0,0,0.80)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontFamily:"monospace",fontSize:10,color:"#92bef0",fontWeight:"bold",letterSpacing:1}}>{activeProjObj.name}</span>
            <span style={{fontFamily:"monospace",fontSize:8,color:"rgba(148,180,232,0.52)"}}>
              {activeProjObj.subtasks.filter(s=>(s.hp??s.maxHp??1)<=0).length}/{activeProjObj.subtasks.length} done
            </span>
            <div style={{flex:1,minWidth:80}}><HpBar hp={projectCurrentHp(activeProjObj)} maxHp={projectMaxHp(activeProjObj)}/></div>
            <button onClick={()=>{setActiveProj(null);setPopup(null);}}
              style={{background:"transparent",border:"none",color:"rgba(148,162,222,0.40)",cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {activeProjObj.subtasks.map(st=>{
              const dead=(st.hp??st.maxHp??1)<=0;
              const preEvo=BOSS_SPECIES[activeProjObj.type]?.preEvo||"spinarak";
              const img=spritesRef.current[preEvo];
              return (
                <div key={st.id} style={{display:"flex",flexDirection:"column",alignItems:"center",
                  width:80,padding:"6px 4px",borderRadius:4,
                  background:dead?"rgba(12,10,30,0.68)":"rgba(10,8,32,0.78)",
                  border:`1px solid ${dead?"rgba(50,48,88,0.22)":"rgba(90,110,190,0.30)"}`,
                  opacity:dead?0.45:1}}>
                  <div style={{width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {img&&img.complete&&img.naturalWidth>0
                      ? <img src={img.src} style={{width:40,height:40,imageRendering:"pixelated",filter:dead?"grayscale(1) brightness(0.44)":undefined}} alt={preEvo}/>
                      : <div style={{width:20,height:20,borderRadius:"50%",background:"#5c64a4"}}/>}
                  </div>
                  <div style={{fontFamily:"monospace",fontSize:8,color:dead?"#42406c":"#bec8f4",textAlign:"center",marginBottom:3,wordBreak:"break-word"}}>
                    {st.name.length>9?st.name.slice(0,8)+"…":st.name}
                  </div>
                  <HpBar hp={st.hp??st.maxHp??1} maxHp={st.maxHp??1} compact/>
                  <button
                    onClick={()=>{
                      if(!dead) squishAt(activeProjObj.id,preEvo,false);
                      const nHp2=Math.max(0,(st.hp??st.maxHp??1)-1);
                      setProjects(prev=>prev.map(p=>p.id!==activeProjObj.id?p:{...p,subtasks:p.subtasks.map(s=>s.id!==st.id?s:{...s,hp:nHp2})}));
                    }}
                    disabled={dead}
                    style={{marginTop:4,background:dead?"rgba(28,26,52,0.38)":"rgba(112,28,14,0.26)",
                      border:`1px solid ${dead?"rgba(50,48,84,0.24)":"rgba(132,36,18,0.42)"}`,
                      color:dead?"#303260":"#c86a4a",padding:"3px 6px",borderRadius:3,
                      cursor:dead?"default":"pointer",fontSize:9,fontFamily:"monospace"}}>
                    {dead?"done":(st.hp??st.maxHp??1)>1?"-1 hp":"squish"}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Add task form ───────────────────────────────────────────────────── */}
      {showForm==="task"&&(
        <div style={{...formStyle,minWidth:isMobile?undefined:320}}>
          <div style={{display:"flex",gap:9,flexWrap:"wrap",alignItems:"flex-end",marginBottom:10}}>
            {[
              {k:"TASK NAME",el:<input autoFocus value={nName} onChange={e=>setNName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="what needs doing…" style={INP({width:"100%",boxSizing:"border-box",minWidth:120})}/>},
              {k:"CREATURE", el:<select value={nType} onChange={e=>setNType(e.target.value)} style={INP({width:"100%",boxSizing:"border-box",minWidth:100})}>{Object.entries(SPECIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>},
              {k:"DEADLINE", el:<input type="date" min={todayStr} value={nDate} onChange={e=>setNDate(e.target.value)} style={INP({width:"100%",boxSizing:"border-box",minWidth:110})}/>},
              {k:"TIME",     el:<input type="time" value={nTime} onChange={e=>setNTime(e.target.value)} style={INP({width:"100%",boxSizing:"border-box",minWidth:80})}/>},
              {k:"HEALTH",   el:<select value={nHp} onChange={e=>setNHp(Number(e.target.value))} style={INP({width:"100%",boxSizing:"border-box",minWidth:60})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}</select>},
            ].map(({k,el})=><div key={k} style={{display:"flex",flexDirection:"column",flex:"1 1 100px"}}><label style={LBL}>{k}</label>{el}</div>)}
          </div>
          <div style={{marginBottom:10}}>
            <label style={LBL}>NOTES (optional)</label>
            <textarea value={nNote} onChange={e=>setNNote(e.target.value.slice(0,200))} placeholder="any extra details…" style={{...noteStyle}}/>
          </div>
          <button onClick={addTask} disabled={!nName.trim()||!nDate}
            style={{...BTN(nName.trim()&&nDate?"primary":"neutral"),width:"100%",padding:"7px 0",letterSpacing:1,marginBottom:10,opacity:nName.trim()&&nDate?1:0.4}}>
            spawn →
          </button>
          <div style={{borderTop:"1px solid rgba(98,90,164,0.18)",paddingTop:10}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}}>
              <input type="checkbox" checked={nRecurring} onChange={e=>setNRecurring(e.target.checked)} style={{accentColor:"#a09ad8",width:13,height:13}}/>
              <span style={{fontFamily:"monospace",fontSize:9,color:"rgba(188,182,240,0.72)",letterSpacing:1}}>RECURRING TASK</span>
            </label>
            {nRecurring&&(
              <div style={{display:"flex",gap:9,marginTop:8,alignItems:"flex-end",flexWrap:"wrap"}}>
                <div style={{display:"flex",flexDirection:"column",flex:"1 1 120px"}}>
                  <label style={LBL}>FREQUENCY</label>
                  <select value={nFreq} onChange={e=>setNFreq(e.target.value)} style={INP({width:"100%",boxSizing:"border-box"})}>{FREQ_OPTIONS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}</select>
                </div>
                <div style={{display:"flex",flexDirection:"column",flex:"1 1 100px"}}>
                  <label style={LBL}>OCCURRENCES</label>
                  <select value={nCount} onChange={e=>setNCount(e.target.value)} style={INP({width:"100%",boxSizing:"border-box"})}>{countOptions.map(c=><option key={c} value={c}>{c==="infinite"?"∞ infinite":c}</option>)}</select>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Add project form ────────────────────────────────────────────────── */}
      {showForm==="project"&&(
        <div style={{...formStyle,minWidth:isMobile?undefined:340}}>
          <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(128,168,222,0.58)",marginBottom:10,letterSpacing:2}}>NEW PROJECT</div>
          <div style={{display:"flex",gap:9,flexWrap:"wrap",marginBottom:10}}>
            {[
              {k:"PROJECT NAME",el:<input autoFocus value={pName} onChange={e=>setPName(e.target.value)} placeholder="project name…" style={INP({width:"100%",boxSizing:"border-box",minWidth:120})}/>},
              {k:"BOSS",        el:<select value={pType} onChange={e=>setPType(e.target.value)} style={INP({width:"100%",boxSizing:"border-box",minWidth:130})}>{Object.keys(BOSS_SPECIES).map(k=><option key={k} value={k}>{bossLabel(k)}</option>)}</select>},
              {k:"DEADLINE",    el:<input type="date" min={todayStr} value={pDate} onChange={e=>setPDate(e.target.value)} style={INP({width:"100%",boxSizing:"border-box",minWidth:110})}/>},
              {k:"TIME",        el:<input type="time" value={pTime} onChange={e=>setPTime(e.target.value)} style={INP({width:"100%",boxSizing:"border-box",minWidth:80})}/>},
            ].map(({k,el})=><div key={k} style={{display:"flex",flexDirection:"column",flex:"1 1 100px"}}><label style={LBL}>{k}</label>{el}</div>)}
          </div>
          <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(128,168,222,0.50)",marginBottom:6,letterSpacing:1}}>SUBTASKS</div>
          {pSubtasks.map((st,i)=>(
            <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}>
              <input value={st.name} onChange={e=>{const a=[...pSubtasks];a[i]={...a[i],name:e.target.value};setPSubtasks(a);}} placeholder={`subtask ${i+1}…`} style={INP({flex:1,minWidth:80})}/>
              <select value={st.maxHp} onChange={e=>{const a=[...pSubtasks];a[i]={...a[i],maxHp:Number(e.target.value)};setPSubtasks(a);}} style={INP({width:60})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n}hp</option>)}</select>
              {pSubtasks.length>1&&<button onClick={()=>setPSubtasks(pSubtasks.filter((_,j)=>j!==i))} style={{background:"transparent",border:"none",color:"rgba(188,84,64,0.68)",cursor:"pointer",fontSize:13,padding:"0 4px"}}>✕</button>}
            </div>
          ))}
          <button onClick={()=>setPSubtasks([...pSubtasks,{name:"",maxHp:1}])}
            style={{...BTN("neutral"),width:"100%",padding:"5px 0",marginBottom:10,fontSize:9}}>+ add subtask</button>
          <button onClick={addProject} disabled={!pName.trim()||!pDate||!pSubtasks.some(s=>s.name.trim())}
            style={{...BTN("primary"),width:"100%",padding:"7px 0",letterSpacing:1,
              opacity:pName.trim()&&pDate&&pSubtasks.some(s=>s.name.trim())?1:0.4}}>spawn project →</button>
        </div>
      )}

      {/* ── Task popup ──────────────────────────────────────────────────────── */}
      {popup?.kind==="task"&&selTask&&!editItem&&(
        <PopCard>
          <div style={{fontFamily:"monospace",fontSize:9,color:speciesColor(selTask.type).text,marginBottom:2,letterSpacing:1,opacity:0.7}}>{SPECIES[selTask.type]?.label}</div>
          <div style={{fontFamily:"monospace",fontSize:12,color:"#d2ccff",marginBottom:2,fontWeight:"bold"}}>{selTask.name}</div>
          <div style={{fontFamily:"monospace",fontSize:9,color:selTask.deadline-Date.now()<=0?"rgba(255,120,100,0.80)":"rgba(178,172,232,0.55)",marginBottom:6}}>{formatCountdown(selTask.deadline-Date.now())}</div>
          {selTask.note&&<div style={{fontFamily:"monospace",fontSize:9,color:"rgba(170,165,220,0.65)",marginBottom:8,lineHeight:1.5,borderLeft:"2px solid rgba(120,112,190,0.30)",paddingLeft:8}}>{selTask.note}</div>}
          {(selTask.maxHp??1)>1&&<HpBar hp={selTask.hp??selTask.maxHp??1} maxHp={selTask.maxHp??1}/>}
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <button onClick={()=>{const d=new Date(selTask.deadline);setEditItem({kind:"task",...selTask,date:d.toISOString().split("T")[0],time:`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`,maxHp:selTask.maxHp??1,hp:selTask.hp??selTask.maxHp??1,note:selTask.note??"",});}} style={{...BTN("primary"),flex:1}}>✎ edit</button>
            <button onClick={()=>{const cur=selTask.hp??selTask.maxHp??1,nx=cur-1;squishAt(selTask.id,selTask.type,false);if(nx<=0)removeTask(selTask.id);else{setTasks(p=>p.map(t=>t.id===selTask.id?{...t,hp:nx}:t));setPopup(null);}}} style={{...BTN("danger"),flex:1}}>{(selTask.hp??selTask.maxHp??1)>1?"✕ -1 hp":"✕ squish"}</button>
          </div>
          <button onClick={()=>askConfirm("Remove this task permanently?",()=>removeTask(selTask.id))} style={{...BTN("danger"),width:"100%",marginBottom:4,fontSize:9}}>🗑 remove task</button>
          <button onClick={()=>setPopup(null)} style={{width:"100%",background:"transparent",border:"none",color:"rgba(132,124,192,0.30)",cursor:"pointer",fontSize:9,fontFamily:"monospace"}}>dismiss</button>
        </PopCard>
      )}

      {/* ── Recurring popup ──────────────────────────────────────────────────── */}
      {popup?.kind==="recurring"&&selRecI&&selRecT&&!editItem&&(
        <PopCard>
          <div style={{fontFamily:"monospace",fontSize:9,color:speciesColor(selRecI.type).text,marginBottom:2,letterSpacing:1,opacity:0.7}}>
            {SPECIES[selRecI.type]?.label} · recurring{selRecT.paused&&<span style={{marginLeft:6,color:"rgba(210,160,50,0.80)"}}>⏸</span>}
          </div>
          <div style={{fontFamily:"monospace",fontSize:12,color:"#d2ccff",marginBottom:2,fontWeight:"bold"}}>{selRecI.name}</div>
          <div style={{fontFamily:"monospace",fontSize:9,color:selRecI.deadline-Date.now()<=0?"rgba(255,120,100,0.80)":"rgba(178,172,232,0.55)",marginBottom:2}}>{formatCountdown(selRecI.deadline-Date.now())}</div>
          <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(158,150,218,0.40)",marginBottom:selRecT.note?4:6,display:"flex",alignItems:"center",gap:10}}>
            <span>occ. {selRecI.occIdx+1}{selRecT.count!=="infinite"?` of ${selRecT.count}`:""} · {FREQ_OPTIONS.find(f=>f.value===selRecT.freq)?.label}</span>
            {(streaks[selRecT.id]??0)>0&&<span style={{color:"rgba(255,200,60,0.75)"}}>🔥 {streaks[selRecT.id]}</span>}
          </div>
          {selRecT.note&&<div style={{fontFamily:"monospace",fontSize:9,color:"rgba(170,165,220,0.65)",marginBottom:8,lineHeight:1.5,borderLeft:"2px solid rgba(120,112,190,0.30)",paddingLeft:8}}>{selRecT.note}</div>}
          {(selRecI.maxHp??1)>1&&<HpBar hp={selRecI.hp??selRecI.maxHp??1} maxHp={selRecI.maxHp??1}/>}
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <button onClick={()=>{const d=new Date(selRecT.startDeadline);setEditItem({kind:"recurring",id:selRecT.id,name:selRecT.name,type:selRecT.type,maxHp:selRecT.maxHp,freq:selRecT.freq,count:selRecT.count,note:selRecT.note??"",date:d.toISOString().split("T")[0],time:`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`,});}} style={{...BTN("primary"),flex:1}}>✎ edit series</button>
            <button onClick={()=>{
              squishAt(selRecI.id,selRecI.type,false);
              const key=`${selRecI.templateId}:${selRecI.occIdx}`,cur=selRecI.hp??selRecI.maxHp??1,nx=cur-1;
              setRecurringHp(p=>({...p,[key]:Math.max(0,nx)}));
              if(nx<=0){const onTime=selRecI.deadline>Date.now();setStreaks(p=>({...p,[selRecI.templateId]:onTime?(p[selRecI.templateId]??0)+1:0}));}
              setPopup(null);
            }} style={{...BTN("danger"),flex:1}}>{(selRecI.hp??selRecI.maxHp??1)>1?"✕ -1 hp":"✕ squish"}</button>
          </div>
          <button onClick={()=>setRecurringTemplates(p=>p.map(t=>t.id===selRecT.id?{...t,paused:!t.paused}:t))} style={{...BTN("warn"),width:"100%",marginBottom:6,fontSize:9}}>{selRecT.paused?"▶ resume series":"⏸ pause series"}</button>
          <button onClick={()=>askConfirm("Skip this occurrence? Won't count toward your streak.",()=>{
            const key=`${selRecI.templateId}:${selRecI.occIdx}`;
            setRecurringHp(p=>({...p,[key]:0}));
            cleanupRefs(selRecI.id); setPopup(null);
          })} style={{...BTN("neutral"),width:"100%",marginBottom:6,fontSize:9}}>⏭ skip this occurrence</button>
          <button onClick={()=>askConfirm("Remove this entire recurring series?",()=>removeRecurringSeries(selRecT.id))} style={{...BTN("danger"),width:"100%",marginBottom:4,fontSize:9}}>🗑 remove entire series</button>
          <button onClick={()=>setPopup(null)} style={{width:"100%",background:"transparent",border:"none",color:"rgba(132,124,192,0.30)",cursor:"pointer",fontSize:9,fontFamily:"monospace"}}>dismiss</button>
        </PopCard>
      )}

      {/* ── Project popup ───────────────────────────────────────────────────── */}
      {popup?.kind==="project"&&selProj&&!editItem&&(
        <PopCard>
          <div style={{fontFamily:"monospace",fontSize:9,color:speciesColor(selProj.type).text,marginBottom:2,letterSpacing:1,opacity:0.7}}>{BOSS_SPECIES[selProj.type]?.label} · project</div>
          <div style={{fontFamily:"monospace",fontSize:12,color:"#aecef4",marginBottom:2,fontWeight:"bold"}}>{selProj.name}</div>
          <div style={{fontFamily:"monospace",fontSize:9,color:selProj.deadline-Date.now()<=0?"rgba(255,120,100,0.80)":"rgba(148,180,232,0.52)",marginBottom:6}}>{formatCountdown(selProj.deadline-Date.now())}</div>
          <HpBar hp={projectCurrentHp(selProj)} maxHp={projectMaxHp(selProj)}/>
          <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(148,180,232,0.50)",marginBottom:8}}>{selProj.subtasks.filter(s=>(s.hp??s.maxHp??1)<=0).length}/{selProj.subtasks.length} subtasks done</div>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <button onClick={()=>{const d=new Date(selProj.deadline);setEditItem({kind:"project",...selProj,date:d.toISOString().split("T")[0],time:`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`,});}} style={{...BTN("primary"),flex:1}}>✎ edit</button>
            {projectAllDead(selProj)&&<button onClick={()=>{squishAt(selProj.id,selProj.type,true);removeProject(selProj.id);}} style={{...BTN("danger"),flex:1}}>💥 squish boss</button>}
          </div>
          <button onClick={()=>askConfirm("Remove this project permanently?",()=>removeProject(selProj.id))} style={{...BTN("danger"),width:"100%",marginBottom:4,fontSize:9}}>🗑 remove project</button>
          <button onClick={()=>setPopup(null)} style={{width:"100%",background:"transparent",border:"none",color:"rgba(132,124,192,0.30)",cursor:"pointer",fontSize:9,fontFamily:"monospace"}}>dismiss</button>
        </PopCard>
      )}

      {/* ── Edit modal — centered, always fully visible, explicit close only ── */}
      {editItem&&(
        <div style={{position:"fixed",inset:0,zIndex:32,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.45)"}}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"rgba(5,4,22,0.98)", border:"1px solid rgba(112,104,178,0.34)",
            borderRadius:6, padding:"13px 15px", zIndex:33,
            width:isMobile?"calc(100vw - 16px)":242,
            maxHeight:"88vh", overflowY:"auto",
            boxShadow:"0 2px 30px rgba(0,0,0,0.90), 0 0 14px rgba(112,104,205,0.18)",
          }}>
          <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(158,150,218,0.42)",marginBottom:10,letterSpacing:2}}>
            EDIT {editItem.kind==="task"?"TASK":editItem.kind==="recurring"?"RECURRING SERIES":"PROJECT"}
          </div>
          <Field label="NAME"><input autoFocus value={editItem.name} onChange={e=>setEditItem(t=>({...t,name:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}/></Field>
          {editItem.kind!=="project"&&<Field label="CREATURE"><select value={editItem.type} onChange={e=>setEditItem(t=>({...t,type:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}>{Object.entries(SPECIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></Field>}
          {editItem.kind==="project"&&<Field label="BOSS"><select value={editItem.type} onChange={e=>setEditItem(t=>({...t,type:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}>{Object.keys(BOSS_SPECIES).map(k=><option key={k} value={k}>{bossLabel(k)}</option>)}</select></Field>}
          {editItem.kind==="recurring"&&<>
            <Field label="FREQUENCY"><select value={editItem.freq} onChange={e=>setEditItem(t=>({...t,freq:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}>{FREQ_OPTIONS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}</select></Field>
            <Field label="OCCURRENCES"><select value={editItem.count} onChange={e=>setEditItem(t=>({...t,count:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}>{countOptions.map(c=><option key={c} value={c}>{c==="infinite"?"∞ infinite":c}</option>)}</select></Field>
            <Field label="MAX HEALTH"><select value={editItem.maxHp??1} onChange={e=>setEditItem(t=>({...t,maxHp:Number(e.target.value)}))} style={INP({width:"100%",boxSizing:"border-box"})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}</select></Field>
          </>}
          <Field label="DEADLINE"><input type="date" value={editItem.date} onChange={e=>setEditItem(t=>({...t,date:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}/></Field>
          <Field label="TIME"><input type="time" value={editItem.time} onChange={e=>setEditItem(t=>({...t,time:e.target.value}))} style={INP({width:"100%",boxSizing:"border-box"})}/></Field>
          {editItem.kind==="task"&&<>
            <Field label="MAX HEALTH"><select value={editItem.maxHp??1} onChange={e=>{const v=Number(e.target.value);setEditItem(t=>({...t,maxHp:v,hp:Math.min(t.hp??v,v)}));}} style={INP({width:"100%",boxSizing:"border-box"})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}</select></Field>
            <Field label="CURRENT HEALTH"><select value={editItem.hp??editItem.maxHp??1} onChange={e=>setEditItem(t=>({...t,hp:Number(e.target.value)}))} style={INP({width:"100%",boxSizing:"border-box"})}>{Array.from({length:(editItem.maxHp??1)+1},(_,i)=>i).map(n=><option key={n} value={n}>{n}</option>)}</select></Field>
          </>}
          {(editItem.kind==="task"||editItem.kind==="recurring")&&(
            <Field label="NOTES (optional)">
              <textarea value={editItem.note??""} onChange={e=>setEditItem(t=>({...t,note:e.target.value.slice(0,200)}))} style={{...noteStyle}}/>
            </Field>
          )}
          {editItem.kind==="project"&&<>
            <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(128,168,222,0.50)",marginBottom:6,marginTop:4,letterSpacing:1}}>SUBTASKS</div>
            {(editItem.subtasks||[]).map((st,i)=>(
              <div key={st.id||i} style={{display:"flex",gap:5,alignItems:"center",marginBottom:5}}>
                <input value={st.name} onChange={e=>{const a=[...editItem.subtasks];a[i]={...a[i],name:e.target.value};setEditItem(t=>({...t,subtasks:a}));}} style={INP({flex:1,minWidth:60,fontSize:10})}/>
                <select value={st.maxHp??1} onChange={e=>{const a=[...editItem.subtasks];const v=Number(e.target.value);a[i]={...a[i],maxHp:v,hp:Math.min(a[i].hp??v,v)};setEditItem(t=>({...t,subtasks:a}));}} style={INP({width:55,fontSize:10})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n}hp</option>)}</select>
                <select value={st.hp??st.maxHp??1} onChange={e=>{const a=[...editItem.subtasks];a[i]={...a[i],hp:Number(e.target.value)};setEditItem(t=>({...t,subtasks:a}));}} style={INP({width:55,fontSize:10})}>{Array.from({length:(st.maxHp??1)+1},(_,j)=>j).map(n=><option key={n} value={n}>{n}</option>)}</select>
                <button onClick={()=>setEditItem(t=>({...t,subtasks:t.subtasks.filter((_,j)=>j!==i)}))} style={{background:"transparent",border:"none",color:"rgba(188,84,64,0.68)",cursor:"pointer",fontSize:13,padding:"0 3px"}}>✕</button>
              </div>
            ))}
            <button onClick={()=>setEditItem(t=>({...t,subtasks:[...t.subtasks,{id:`st_${Date.now()}`,name:"",maxHp:1,hp:1}]}))} style={{...BTN("neutral"),width:"100%",padding:"4px 0",marginBottom:8,fontSize:9}}>+ add subtask</button>
          </>}
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button onClick={saveEdit} style={{...BTN("primary"),flex:1}}>save</button>
            <button onClick={()=>setEditItem(null)} style={{...BTN("neutral"),flex:1}}>cancel</button>
          </div>
          </div>
        </div>
      )}

      {/* ── Info overlay ────────────────────────────────────────────────────── */}
      {showInfo&&(
        <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.75)"}}
          onClick={()=>setShowInfo(false)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"rgba(6,4,22,0.98)",border:"1px solid rgba(112,104,178,0.38)",
            borderRadius:10,padding:"22px 24px",maxWidth:500,width:"calc(100vw - 28px)",
            maxHeight:"88vh",overflowY:"auto",
            boxShadow:"0 4px 40px rgba(0,0,0,0.88), 0 0 24px rgba(110,100,200,0.18)",
          }}>

            {/* ── Header ── */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <svg width="20" height="20" viewBox="0 0 22 22">
                  <circle cx="11" cy="11" r="2.2" fill="rgba(195,245,240,0.96)"/>
                  {[0,1,2,3,4,5,6,7].map(i=>{const a=(i/8)*Math.PI*2-Math.PI/2;return<line key={i} x1="11" y1="11" x2={11+Math.cos(a)*10} y2={11+Math.sin(a)*10} stroke="rgba(218,210,178,0.45)" strokeWidth="0.9"/>;  })}
                  {[0.38,0.65,0.92].map((f,i)=><circle key={i} cx="11" cy="11" r={f*10} fill="none" stroke={`rgba(218,210,178,${0.15+i*0.08})`} strokeWidth="0.8"/>)}
                </svg>
                <span style={{fontFamily:"monospace",fontSize:15,color:"#d0c8ff",fontWeight:"bold",letterSpacing:2}}>Pokémon Silk</span>
              </div>
              <button onClick={()=>setShowInfo(false)} style={{background:"transparent",border:"none",color:"rgba(160,152,220,0.45)",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 2px"}}>✕</button>
            </div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(180,172,240,0.45)",marginBottom:18,letterSpacing:1}}>v3 · fan project by Aditya Koneru</div>

            {/* ── Opening hook ── */}
            <div style={{fontFamily:"monospace",fontSize:10,color:"rgba(215,210,255,0.92)",lineHeight:2.0,marginBottom:22,padding:"14px 16px",background:"rgba(80,60,180,0.13)",borderRadius:7,border:"1px solid rgba(120,100,210,0.24)"}}>
              Pokémon Silk is a <span style={{color:"#c8beff",fontWeight:"bold"}}>visual to-do list</span> where every task becomes a spider Pokémon creeping toward the center of a glowing web — the closer it gets, the sooner the deadline. Tasks have <span style={{color:"#e8c840",fontWeight:"bold"}}>health points</span> and take multiple hits to squish. Big multi-step projects spawn as <span style={{color:"#f0a060",fontWeight:"bold"}}>evolved boss Pokémon</span> with subtasks you chip away at one by one. Set up <span style={{color:"#78cce0",fontWeight:"bold"}}>recurring tasks</span> that auto-populate the web on schedule and track your 🔥 streak for consistency. The web has <span style={{color:"#c0b8f0",fontWeight:"bold"}}>four deadline zones</span> — spiders accelerate as they close in — and anything you miss goes <span style={{color:"#ff7060",fontWeight:"bold"}}>overdue</span> and pulses red at the center, staring at you. Everything saves automatically. No account. No cloud. Just you and your spiders.
              <br/><br/>
              It's a productivity app. We promise.
            </div>

            {/* ── Section 1: The Web ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(120,204,224,0.75)",letterSpacing:1.5,marginBottom:10}}>① THE WEB — YOUR ANXIETY DASHBOARD</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:10}}>
              Three faint dashed rings divide the web into <span style={{color:"#78cce0",fontWeight:"bold"}}>deadline zones</span>. Spiders spawn at the outer edge and creep inward over time:
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              {[
                {label:"outer edge", time:"30–90 days out", col:"rgba(100,222,192,0.85)"},
                {label:"middle zone",time:"7–30 days out",  col:"rgba(120,182,255,0.85)"},
                {label:"inner zone", time:"1–7 days out",   col:"rgba(210,162,255,0.85)"},
                {label:"danger zone",time:"last 24 hours",  col:"rgba(255,110,90,0.85)"},
              ].map(({label,time,col})=>(
                <div key={label} style={{flex:"1 1 100px",padding:"7px 9px",background:"rgba(20,16,50,0.60)",borderRadius:5,border:`1px solid ${col.replace("0.85","0.22")}`}}>
                  <div style={{fontFamily:"monospace",fontSize:8,color:col,marginBottom:2,fontWeight:"bold"}}>{label}</div>
                  <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(185,180,235,0.62)"}}>{time}</div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:20}}>
              Inside that last 24h ring, spiders <span style={{color:"#ff9060",fontWeight:"bold"}}>accelerate sharply</span>. Anything that hits zero goes <span style={{color:"#ff7060",fontWeight:"bold"}}>OVERDUE</span> — it parks at the center, pulses red, and refuses to leave until you deal with it. The <span style={{color:"rgba(255,120,90,0.95)",fontWeight:"bold"}}>💀 squish overdue</span> button in the header will detonate all of them at once when you're done feeling bad about yourself.
            </div>

            {/* ── Section 2: Meet the Crew ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(232,200,64,0.75)",letterSpacing:1.5,marginBottom:10}}>② MEET THE CREW</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:12}}>
              Six spider Pokémon live on your web — three for tasks, three for projects. The task species are <span style={{color:"#a8d868",fontWeight:"bold"}}>entirely yours to categorise</span>: work vs personal vs home, urgent vs chill vs "I'll do it eventually," or just vibes. No rules. The bosses are their evolved forms — same colour, bigger energy, breathing slowly while your deadline approaches.
            </div>
            <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(168,216,104,0.50)",letterSpacing:1,marginBottom:7}}>TASKS</div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {[
                {key:"spinarak",name:"Spinarak",col:SPECIES_COLOR.spinarak,desc:"Nimble. Slightly sinister. Gets things done."},
                {key:"joltik",  name:"Joltik",  col:SPECIES_COLOR.joltik,  desc:"Tiny and electric. The tasks that sneak up on you."},
                {key:"dewpider",name:"Dewpider", col:SPECIES_COLOR.dewpider,desc:"Chill exterior. Absolutely not fine."},
              ].map(({key,name,col,desc})=>(
                <div key={key} style={{flex:"1 1 120px",padding:"10px 8px",background:col.pill,border:`1px solid ${col.border}`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <div style={{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <img src={staticSpriteUrl(key)} alt={name}
                      style={{width:56,height:56,imageRendering:"pixelated",objectFit:"contain"}}
                      onError={e=>{e.target.src=spriteUrls(key)[0];}}/>
                  </div>
                  <div style={{fontFamily:"monospace",fontSize:10,color:col.text,fontWeight:"bold"}}>{name}</div>
                  <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(210,205,255,0.62)",textAlign:"center",lineHeight:1.5}}>{desc}</div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(232,200,64,0.50)",letterSpacing:1,marginBottom:7}}>PROJECT BOSSES</div>
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {[
                {key:"ariados",   name:"Ariados",   col:SPECIES_COLOR.spinarak,desc:"Spinarak, but it's been stewing for weeks."},
                {key:"galvantula",name:"Galvantula", col:SPECIES_COLOR.joltik,  desc:"Joltik's final form. More legs. More problems."},
                {key:"araquanid", name:"Araquanid",  col:SPECIES_COLOR.dewpider,desc:"Dewpider finally grew up. Now it's your boss."},
              ].map(({key,name,col,desc})=>(
                <div key={key} style={{flex:"1 1 120px",padding:"10px 8px",background:col.pill,border:`1px solid ${col.border}`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",gap:5,opacity:0.88}}>
                  <div style={{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <img src={staticSpriteUrl(key)} alt={name}
                      style={{width:56,height:56,imageRendering:"pixelated",objectFit:"contain"}}
                      onError={e=>{e.target.src=spriteUrls(key)[0];}}/>
                  </div>
                  <div style={{fontFamily:"monospace",fontSize:10,color:col.text,fontWeight:"bold"}}>{name}</div>
                  <div style={{fontFamily:"monospace",fontSize:8,color:"rgba(210,205,255,0.62)",textAlign:"center",lineHeight:1.5}}>{desc}</div>
                </div>
              ))}
            </div>

            {/* ── Section 3: Tasks ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(168,216,104,0.75)",letterSpacing:1.5,marginBottom:10}}>③ TASKS — THE BASICS</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:20}}>
              Hit <span style={{color:"#b2aaea",fontWeight:"bold"}}>+ task</span>, give it a name, pick a creature, set a deadline. Optional: add <span style={{color:"#f0c080",fontWeight:"bold"}}>health points</span> (1–5 hits before it dies — great for tasks needing multiple rounds of work), and a <span style={{color:"#b2aaea",fontWeight:"bold"}}>note</span> for any extra context. Hit <span style={{color:"#b2aaea",fontWeight:"bold"}}>spawn →</span> and watch it crawl onto the web. <span style={{color:"#e8c840",fontWeight:"bold"}}>Tap any spider</span> to open its menu: squish it, deal damage, edit it, or remove it. The label below each spider shows the name, countdown, and HP — you always know where things stand at a glance.
            </div>

            {/* ── Section 4: Projects ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(255,160,100,0.75)",letterSpacing:1.5,marginBottom:10}}>④ PROJECTS — BOSS FIGHTS</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:20}}>
              Hit <span style={{color:"#92bcec",fontWeight:"bold"}}>+ project</span> for multi-step work. Pick your boss, add subtasks each with their own HP, set a deadline. The boss's HP bar on the web is the sum of all subtasks — tap it to open a subtask panel and chip away at each one. When every subtask hits zero, you unlock <span style={{color:"#d26858",fontWeight:"bold"}}>💥 squish boss</span>. It explodes more dramatically than a regular task. You've earned it.
            </div>

            {/* ── Section 5: Recurring Tasks ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(120,204,224,0.75)",letterSpacing:1.5,marginBottom:10}}>⑤ RECURRING TASKS</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:20}}>
              Tick <span style={{color:"#78cce0",fontWeight:"bold"}}>Recurring</span> when creating a task. Set frequency (daily → monthly) and how many times — or <span style={{color:"#78cce0",fontWeight:"bold"}}>∞ forever</span> for the things in life that never end (laundry, gym, that report). All upcoming occurrences within 30 days appear on the web simultaneously. Their labels show the cadence — <span style={{color:"#78cce0"}}>(weekly)</span>, <span style={{color:"#78cce0"}}>(daily)</span> — so you always know what you're looking at. Squish on time → <span style={{color:"#ffcc30",fontWeight:"bold"}}>🔥 streak grows</span>. Miss the deadline → streak resets, shame intensifies. From the popup you can <span style={{color:"#d4a030",fontWeight:"bold"}}>⏸ pause</span> a whole series, <span style={{color:"#b2aaea",fontWeight:"bold"}}>⏭ skip</span> one occurrence without penalty, or delete the series entirely.
            </div>

            {/* ── Section 6: Saving ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(192,184,240,0.75)",letterSpacing:1.5,marginBottom:10}}>⑥ SAVING & SYNCING</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.78)",lineHeight:1.85,marginBottom:20}}>
              Saves to <span style={{color:"#c0b8f0",fontWeight:"bold"}}>this browser on this device</span>, silently, every time something changes. No account, no login, no drama. To move your web to another device: <span style={{color:"#96b4f0",fontWeight:"bold"}}>↓ Export</span> a backup file, then <span style={{color:"#96b4f0",fontWeight:"bold"}}>↑ Import</span> it on the new device. Keep that file somewhere safe — clearing your browser data without a backup means starting fresh.
            </div>

            {/* ── Section 7: Secrets ── */}
            <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(255,200,80,0.75)",letterSpacing:1.5,marginBottom:10}}>⑦ LITTLE DETAILS WORTH KNOWING</div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:20}}>
              {[
                {e:"🌐", t:"Tap empty space outside the web", d:"shoots a silk strand toward the web. Satisfying for no reason whatsoever."},
                {e:"💧", t:"Tap anywhere on the web", d:"sends a ripple outward from where you touched. Same deal."},
                {e:"💥", t:"Squish explosions leave splatter marks", d:"that slowly fade on the web. Boss squishes are extra dramatic."},
                {e:"🕷️", t:"Spiders bob, wiggle, and idle", d:"each one alive in its own small way. The web sways gently too."},
                {e:"✨", t:"The sky is genuinely unhinged", d:"shooting stars, drifting fireflies, six aurora bands, a moon with actual craters. We got carried away. No regrets."},
              ].map(({e,t,d})=>(
                <div key={t} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"8px 10px",background:"rgba(30,20,60,0.45)",borderRadius:5,border:"1px solid rgba(80,70,140,0.22)"}}>
                  <span style={{fontSize:14,flexShrink:0,marginTop:1}}>{e}</span>
                  <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(205,200,255,0.75)",lineHeight:1.65}}><span style={{color:"rgba(225,220,255,0.92)",fontWeight:"bold"}}>{t}</span> — {d}</div>
                </div>
              ))}
            </div>

            {/* ── Footer ── */}
            <div style={{paddingTop:12,borderTop:"1px solid rgba(90,80,160,0.18)",fontFamily:"monospace",fontSize:7,color:"rgba(140,134,200,0.35)",lineHeight:1.8,textAlign:"center"}}>
              Pokémon & sprites © Nintendo / Game Freak · Pokémon Silk is a fan project and is not affiliated with or endorsed by Nintendo
            </div>
          </div>
        </div>
      )}

      {/* ── Credits ─────────────────────────────────────────────────────────── */}
      <div style={{position:"absolute",bottom:8,right:12,textAlign:"right",fontFamily:"monospace",lineHeight:1.7}}>
        <div style={{fontSize:8,color:"rgba(198,192,252,0.52)",letterSpacing:0.5}}>
          Pokémon Silk v3 · a fan project by <span style={{color:"rgba(218,212,255,0.72)"}}>Aditya Koneru</span>
        </div>
        <div style={{fontSize:7,color:"rgba(158,152,222,0.32)",letterSpacing:0.4}}>
          Pokémon & sprites © Nintendo / Game Freak · not affiliated
        </div>
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(PokemonSilk));
  </script>
</body>
</html>
