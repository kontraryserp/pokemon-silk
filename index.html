<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokémon Silk</title>
  <meta name="description" content="A visual to-do list where tasks become spider Pokémon crawling toward the center of a glowing web."/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body,#root{width:100%;height:100%;overflow:hidden;background:#05021a;}
    body{-webkit-font-smoothing:antialiased;}
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.7);}
    select option{background:#0d0b28;color:#d2cef8;}
    textarea{font-family:monospace;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:rgba(0,0,0,0);}
    ::-webkit-scrollbar-thumb{background:rgba(112,102,178,0.35);border-radius:2px;}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM + Babel for in-browser JSX compilation -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    // Destructure hooks from React global (replaces the import statement)
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── localStorage loader (module-level, runs once per key) ───────────────────
function loadStored(key, parse){
  try{ const s=localStorage.getItem(key); if(s) return parse(JSON.parse(s)); }catch{}
  return null;
}

// ─── Constants ────────────────────────────────────────────────────────────────
const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
const ONE_DAY    = 24 * 60 * 60 * 1000;
const THIRTY_D   = 30 * ONE_DAY;
const NINETY_D   = 90 * ONE_DAY;
const Z1=0.30, Z2=0.60, Z3=0.85, Z4=1.00;

const SPECIES = {
  spinarak:{ label:"Spinarak", id:167 },
  joltik:  { label:"Joltik",   id:595 },
  dewpider:{ label:"Dewpider", id:751 },
};
const BOSS_SPECIES = {
  ariados:   { label:"Ariados",    id:168, preEvo:"spinarak" },
  galvantula:{ label:"Galvantula", id:596, preEvo:"joltik"   },
  araquanid: { label:"Araquanid",  id:752, preEvo:"dewpider"  },
};

// Species colour palette — used for label pills and canvas tints
const SPECIES_COLOR = {
  spinarak:  { pill:"rgba(60,120,30,0.22)",  border:"rgba(90,170,50,0.38)",  text:"#a8d868" },
  joltik:    { pill:"rgba(120,100,10,0.22)", border:"rgba(210,175,30,0.40)", text:"#e8c840" },
  dewpider:  { pill:"rgba(20,90,110,0.22)",  border:"rgba(50,160,190,0.38)", text:"#78cce0" },
};
// Boss species inherits pre-evo colour (BOSS_SPECIES is declared above, safe)
function speciesColor(type){
  const base = SPECIES_COLOR[type] ?? SPECIES_COLOR[BOSS_SPECIES[type]?.preEvo] ?? null;
  return base ?? { pill:"rgba(40,30,80,0.22)", border:"rgba(130,120,200,0.30)", text:"#c0b8f0" };
}
// Boss display label with evo note
function bossLabel(key){ const b=BOSS_SPECIES[key]; return b?`${b.label} (${b.preEvo} evo)`:key; }

const FREQ_OPTIONS = [
  { value:"daily",    label:"Daily",        ms: ONE_DAY },
  { value:"every2",   label:"Every 2 days", ms: 2*ONE_DAY },
  { value:"weekly",   label:"Weekly",       ms: 7*ONE_DAY },
  { value:"biweekly", label:"Bi-weekly",    ms: 14*ONE_DAY },
  { value:"monthly",  label:"Monthly",      ms: 30*ONE_DAY },
];
function freqMs(v){ return FREQ_OPTIONS.find(f=>f.value===v)?.ms ?? ONE_DAY; }
function spriteUrls(name){
  const ids={spinarak:167,joltik:595,dewpider:751,ariados:168,galvantula:596,araquanid:752};
  return [
    `https://play.pokemonshowdown.com/sprites/ani/${name}.gif`,
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${ids[name]||0}.png`,
  ];
}

// Pixelated static sprite URL for UI display (info panel etc.)
function staticSpriteUrl(name){
  const ids={spinarak:167,joltik:595,dewpider:751,ariados:168,galvantula:596,araquanid:752};
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${ids[name]||0}.png`;
}
// ─── Radius (4-zone piecewise) ────────────────────────────────────────────────
function getRadius(deadline, now, maxR){
  const ms=deadline-now; if(ms<=0) return 0;
  let frac;
  if     (ms<=ONE_DAY)    frac = Z1 * Math.pow(ms/ONE_DAY, 0.35);
  else if(ms<=SEVEN_DAYS) frac = Z1 + (Z2-Z1)*Math.pow((ms-ONE_DAY)/(SEVEN_DAYS-ONE_DAY), 0.55);
  else if(ms<=THIRTY_D)   frac = Z2 + (Z3-Z2)*Math.pow((ms-SEVEN_DAYS)/(THIRTY_D-SEVEN_DAYS), 0.70);
  else                    frac = Z3 + (Z4-Z3)*Math.pow((Math.min(ms,NINETY_D)-THIRTY_D)/(NINETY_D-THIRTY_D), 0.80);
  return maxR * frac;
}

// ─── Overdue position: spread around center so multiple overdue tasks are tappable ──
function overduePos(ent, allEntities, cx, cy, now){
  const overdueEnts = allEntities.filter(e => e.deadline <= now);
  const idx = overdueEnts.findIndex(e => e.id === ent.id);
  const count = overdueEnts.length;
  if(count <= 1) return { x: cx, y: cy };
  const angle = (idx / count) * Math.PI * 2;
  const spread = Math.min(18, count * 4);
  return { x: cx + Math.cos(angle) * spread, y: cy + Math.sin(angle) * spread };
}
function expandRecurring(tmpl, now, hpMap, streakMap){
  if(tmpl.paused) return [];
  const windowEnd = now + THIRTY_D;
  const stepMs    = freqMs(tmpl.freq);
  const maxCount  = tmpl.count==="infinite" ? 9999 : Number(tmpl.count);
  const freqLabel = (FREQ_OPTIONS.find(f=>f.value===tmpl.freq)?.label || "recurring").toLowerCase();
  const suffix    = `(${freqLabel})`;
  const rng       = seededRng(hashStr(tmpl.id));
  const instances = [];
  let   foundAny  = false;
  for(let i=0; i<maxCount; i++){
    const deadline = tmpl.startDeadline + i*stepMs;
    const angle    = (rng()*Math.PI*2 + i*2.399) % (Math.PI*2);
    const key = `${tmpl.id}:${i}`;
    const hp  = hpMap[key] ?? tmpl.maxHp;
    if(hp<=0) continue; // squished
    if(deadline>windowEnd){
      if(!foundAny){
        instances.push({id:key, name:`${tmpl.name} ${suffix}`, deadline, type:tmpl.type,
          maxHp:tmpl.maxHp, hp, angle, isRecurring:true,
          templateId:tmpl.id, occIdx:i, streak:streakMap?.[tmpl.id]??0});
        foundAny=true;
      }
      break;
    }
    instances.push({id:key, name:`${tmpl.name} ${suffix}`, deadline, type:tmpl.type,
      maxHp:tmpl.maxHp, hp, angle, isRecurring:true,
      templateId:tmpl.id, occIdx:i, streak:streakMap?.[tmpl.id]??0});
    foundAny=true;
  }
  return instances;
}

// ─── Pure helpers ─────────────────────────────────────────────────────────────
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return h>>>0; }
function seededRng(seed){ let s=seed>>>0; return ()=>{ s=(Math.imul(1664525,s)+1013904223)>>>0; return s/0x100000000; }; }

function formatCountdown(ms){
  if(ms<=0) return "OVERDUE";
  const s=Math.floor(ms/1000), d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60);
  if(d>0) return `${d}d ${h}h ${m}m`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}
const projectCurrentHp = p => (p.subtasks||[]).reduce((s,t)=>s+(t.hp??t.maxHp??1),0);
const projectMaxHp     = p => (p.subtasks||[]).reduce((s,t)=>s+(t.maxHp??1),0);
const projectAllDead   = p => (p.subtasks||[]).every(t=>(t.hp??t.maxHp??1)<=0);

function spawnSquish(x, y, type){
  const pal={
    spinarak:  ["#5a9e3a","#8dc860","#cc2200","#fff"],
    joltik:    ["#f0c830","#ffe878","#5090e0","#fff"],
    dewpider:  ["#78c8b0","#a8e8d0","#2060b0","#cceeff"],
    ariados:   ["#880020","#cc2244","#5a9e3a","#fff"],
    galvantula:["#f0c830","#ffe878","#4488cc","#aaddff"],
    araquanid: ["#2060b0","#78c8b0","#cceeff","#fff"],
  };
  const cols = pal[type]||["#fff","#aaa"];
  const n    = type in BOSS_SPECIES ? 36 : 20;
  const spd  = type in BOSS_SPECIES ? 10 : 7;
  const sz   = type in BOSS_SPECIES ? 7  : 5;
  return Array.from({length:n}, ()=>({
    x, y,
    vx:(Math.random()-0.5)*spd, vy:(Math.random()-0.5)*spd-2,
    life:1, size:2+Math.random()*sz,
    color:cols[Math.floor(Math.random()*cols.length)],
    wx:x+(Math.random()-0.5)*60, wy:y+(Math.random()-0.5)*40,
  }));
}

function pruneRecurringHp(hpMap, templates){
  const now=Date.now(), pruned={...hpMap};
  for(const key of Object.keys(pruned)){
    const [tid,iStr] = key.split(":");
    const tmpl = templates.find(t=>t.id===tid);
    if(!tmpl){ delete pruned[key]; continue; }
    if(tmpl.startDeadline + Number(iStr)*freqMs(tmpl.freq) < now - 7*ONE_DAY)
      delete pruned[key];
  }
  return pruned;
}

// ─── Static star field ────────────────────────────────────────────────────────
function buildStarField(W, H){
  const off = document.createElement("canvas");
  off.width=W; off.height=H;
  const ctx = off.getContext("2d");
  const rng = seededRng(137);

  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,   "#05021a");
  sky.addColorStop(0.35,"#08052a");
  sky.addColorStop(0.65,"#060820");
  sky.addColorStop(1,   "#040615");
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  for(let i=0; i<280; i++){
    const sx=rng()*W, sy=rng()*H, b=rng(), t=rng();
    const sz=b>0.96?2:1, a=0.40+b*0.60;
    const col = t>0.88?`rgba(255,238,200,${a})`
              : t>0.76?`rgba(190,215,255,${a})`
              : t>0.60?`rgba(255,255,255,${a})`
              : t>0.42?`rgba(225,190,255,${a})`
              : t>0.25?`rgba(180,255,235,${a})`
              :        `rgba(255,210,240,${a})`;
    ctx.fillStyle=col;
    ctx.fillRect(Math.round(sx), Math.round(sy), sz, sz);
    if(b>0.93){
      const sa=a*0.45; ctx.fillStyle=`rgba(225,230,255,${sa})`;
      ctx.fillRect(Math.round(sx)-2, Math.round(sy), 1, 1);
      ctx.fillRect(Math.round(sx)+2, Math.round(sy), 1, 1);
      ctx.fillRect(Math.round(sx), Math.round(sy)-2, 1, 1);
      ctx.fillRect(Math.round(sx), Math.round(sy)+2, 1, 1);
    }
  }

  // Moon radius: capped to never be tiny on narrow screens, but also never large enough to reach the web
  // Moon is at (W*0.82, H*0.10), web center at (W*0.50, H*0.50) with radius min(W,H)*0.42
  // Distance between them is always > 40% of the screen — moon halo (mR*5) can never reach the web
  const mX=Math.floor(W*0.82), mY=Math.floor(H*0.10);
  const mR=Math.floor(Math.max(Math.min(W,H)*0.052, 22)); // floor of 22px prevents tiny moon
  const halo=ctx.createRadialGradient(mX,mY,mR*0.7,mX,mY,mR*5);
  halo.addColorStop(0,"rgba(248,242,200,0.18)"); halo.addColorStop(0.3,"rgba(235,228,185,0.08)");
  halo.addColorStop(0.65,"rgba(215,205,165,0.03)"); halo.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(mX,mY,mR*5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#eee5bc";
  for(let dy=-mR; dy<=mR; dy++){
    const dx=Math.floor(Math.sqrt(Math.max(0,mR*mR-dy*dy)));
    ctx.fillRect(mX-dx, mY+dy, dx*2+1, 1);
  }
  const crater=(cx2,cy2,cr,col)=>{
    ctx.fillStyle=col;
    for(let dy=-cr; dy<=cr; dy++){
      const dx=Math.floor(Math.sqrt(Math.max(0,cr*cr-dy*dy)));
      ctx.fillRect(cx2-dx, cy2+dy, dx*2+1, 1);
    }
  };
  crater(mX-Math.round(mR*0.30), mY-Math.round(mR*0.16), Math.round(mR*0.16), "#d9cd98");
  crater(mX+Math.round(mR*0.26), mY+Math.round(mR*0.27), Math.round(mR*0.11), "#d5c58c");
  crater(mX+Math.round(mR*0.07), mY-Math.round(mR*0.41), Math.round(mR*0.09), "#ddd1a2");
  ctx.save(); ctx.beginPath(); ctx.arc(mX,mY,mR,0,Math.PI*2); ctx.clip();
  const limb=ctx.createLinearGradient(mX-mR,mY,mX+mR,mY);
  limb.addColorStop(0.55,"rgba(0,0,0,0)"); limb.addColorStop(1,"rgba(8,6,3,0.30)");
  ctx.fillStyle=limb; ctx.fillRect(mX-mR,mY-mR,mR*2,mR*2); ctx.restore();
  return off;
}

// ─── Aurora ───────────────────────────────────────────────────────────────────
const AURORA_BANDS=[
  {y:0.08,th:0.18,c:[50,230,190], a:0.055,f1:0.9, f2:1.4,s1:0.14,s2:0.20},
  {y:0.18,th:0.20,c:[160,60,255], a:0.048,f1:1.2, f2:0.7,s1:0.18,s2:0.12},
  {y:0.30,th:0.16,c:[255,60,180], a:0.038,f1:0.7, f2:1.8,s1:0.22,s2:0.16},
  {y:0.44,th:0.22,c:[255,200,60], a:0.032,f1:1.5, f2:0.9,s1:0.12,s2:0.25},
  {y:0.56,th:0.20,c:[40,200,255], a:0.042,f1:0.8, f2:1.6,s1:0.20,s2:0.14},
  {y:0.68,th:0.18,c:[200,80,255], a:0.038,f1:1.1, f2:0.6,s1:0.16,s2:0.22},
  {y:0.80,th:0.16,c:[60,255,180], a:0.030,f1:0.6, f2:1.3,s1:0.24,s2:0.18},
  {y:0.50,th:0.80,c:[80,40,180],  a:0.020,f1:0.4, f2:0.3,s1:0.08,s2:0.06},
  {y:0.22,th:0.12,c:[255,130,140],a:0.028,f1:1.8, f2:1.2,s1:0.28,s2:0.20},
  {y:0.62,th:0.30,c:[20,210,210], a:0.022,f1:0.5, f2:0.8,s1:0.10,s2:0.16},
];
function drawAurora(ctx, W, H, time){
  ctx.save();
  for(const b of AURORA_BANDS){
    const cy2=H*b.y, thPx=H*b.th, [r,g,bl]=b.c;
    const grd=ctx.createLinearGradient(0,cy2-thPx*0.5,0,cy2+thPx*0.5);
    grd.addColorStop(0,   `rgba(${r},${g},${bl},0)`);
    grd.addColorStop(0.35,`rgba(${r},${g},${bl},${b.a})`);
    grd.addColorStop(0.5, `rgba(${r},${g},${bl},${b.a*1.4})`);
    grd.addColorStop(0.65,`rgba(${r},${g},${bl},${b.a})`);
    grd.addColorStop(1,   `rgba(${r},${g},${bl},0)`);
    ctx.fillStyle=grd;
    for(const sign of [1,-1]){
      ctx.beginPath(); ctx.moveTo(0,cy2);
      for(let x=0; x<=W; x+=6){
        const nx=x/W;
        const wave = thPx*0.28*Math.sin(nx*Math.PI*3*b.f1+time*b.s1)
                   + thPx*0.14*Math.sin(nx*Math.PI*5*b.f2+time*b.s2)
                   + thPx*0.08*Math.sin(nx*Math.PI*8*b.f1+time*(b.s1+b.s2));
        ctx.lineTo(x, cy2+wave);
      }
      ctx.lineTo(W, cy2+sign*thPx*0.5);
      ctx.lineTo(0, cy2+sign*thPx*0.5);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.restore();
}

// ─── Web ──────────────────────────────────────────────────────────────────────
function drawWeb(ctx, cx, cy, maxR, time, ripples){
  const SPOKES=16, RINGS=7;
  const sway = Math.sin(time*0.16)*0.55;
  const angles = Array.from({length:SPOKES}, (_,i)=>
    (i/SPOKES)*Math.PI*2 - Math.PI*0.5 + Math.sin(i*2.399)*0.048 + sway*0.005);

  // Spokes
  for(let i=0; i<SPOKES; i++){
    const a=angles[i];
    const sg=ctx.createLinearGradient(cx,cy, cx+Math.cos(a)*maxR, cy+Math.sin(a)*maxR);
    sg.addColorStop(0,   "rgba(228,220,188,0.40)");
    sg.addColorStop(0.38,"rgba(220,212,178,0.22)");
    sg.addColorStop(1,   "rgba(200,192,155,0.07)");
    ctx.strokeStyle=sg; ctx.lineWidth=0.72;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*maxR, cy+Math.sin(a)*maxR); ctx.stroke();
  }

  // Rings
  for(let ring=1; ring<=RINGS; ring++){
    const r=(maxR*ring)/RINGS, alpha=0.07+(ring/RINGS)*0.25;
    ctx.strokeStyle=`rgba(222,215,182,${alpha.toFixed(2)})`;
    ctx.lineWidth=ring<=2?0.5:ring<=5?0.72:0.95;
    ctx.beginPath();
    for(let i=0; i<=SPOKES; i++){
      const a=angles[i%SPOKES];
      const w=1+Math.sin(i*1.618+ring*1.1+time*0.11)*0.010;
      const px=cx+Math.cos(a)*r*w, py=cy+Math.sin(a)*r*w;
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.stroke();
  }

  // Zone rings
  const zones=[{f:Z1,col:"rgba(210,162,255,0.30)",lbl:"1d"},{f:Z2,col:"rgba(120,182,255,0.24)",lbl:"7d"},{f:Z3,col:"rgba(100,222,192,0.20)",lbl:"30d"}];
  for(const {f,col,lbl} of zones){
    const zr=maxR*f;
    ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=0.9; ctx.setLineDash([4,7]);
    ctx.beginPath(); ctx.arc(cx,cy,zr,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.font="bold 8px monospace";
    ctx.fillStyle=col.replace(/[\d.]+\)$/, "0.58)");
    ctx.textAlign="center"; ctx.fillText(lbl,cx,cy-zr-5); ctx.restore();
  }

  // Dew drops
  for(let ring=RINGS-1; ring<=RINGS; ring++){
    const r=(maxR*ring)/RINGS;
    for(let i=0; i<SPOKES; i++){
      if((i+ring)%2!==0) continue;
      const a=angles[i], w=1+Math.sin(i*1.618+ring*1.1+time*0.11)*0.010;
      const dx=cx+Math.cos(a)*r*w, dy2=cy+Math.sin(a)*r*w;
      const p=(Math.sin(time*0.30+i*0.72)+1)*0.5;
      const dg=ctx.createRadialGradient(dx,dy2,0,dx,dy2,5);
      dg.addColorStop(0,`rgba(182,230,255,${0.22+p*0.12})`); dg.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(dx,dy2,5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx,dy2,1.5+p*0.4,0,Math.PI*2);
      ctx.fillStyle=`rgba(190,232,255,${0.42+p*0.20})`; ctx.fill();
      ctx.beginPath(); ctx.arc(dx-0.5,dy2-0.5,0.5,0,Math.PI*2);
      ctx.fillStyle="rgba(255,255,255,0.84)"; ctx.fill();
    }
  }

  // Ripples from clicks on the web
  for(let i=ripples.length-1; i>=0; i--){
    const rip=ripples[i]; rip.age+=0.016; // advanced by caller
    const alpha=Math.max(0,0.55*(1-rip.age/rip.life));
    if(alpha<=0){ ripples.splice(i,1); continue; }
    ctx.save();
    ctx.strokeStyle=`rgba(215,205,175,${alpha})`;
    ctx.lineWidth=1.0*(1-rip.age/rip.life);
    ctx.beginPath(); ctx.arc(rip.x, rip.y, rip.r*rip.age/rip.life, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Center star
  const pulse=0.88+Math.sin(time*0.85)*0.12, sR=7*pulse;
  const og=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*0.15*pulse);
  og.addColorStop(0,`rgba(255,250,215,${0.22*pulse})`); og.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=og; ctx.beginPath(); ctx.arc(cx,cy,maxR*0.15*pulse,0,Math.PI*2); ctx.fill();
  const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,18*pulse);
  ig.addColorStop(0,`rgba(255,254,232,${0.90*pulse})`);
  ig.addColorStop(0.35,`rgba(200,224,255,${0.42*pulse})`);
  ig.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(cx,cy,18*pulse,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(cx,cy);
  ctx.fillStyle=`rgba(255,254,238,${0.97*pulse})`;
  ctx.beginPath();
  for(let i=0; i<8; i++){
    const ang=(i/8)*Math.PI*2-Math.PI/2;
    ctx.lineTo(Math.cos(ang)*(i%2===0?sR:sR*0.36), Math.sin(ang)*(i%2===0?sR:sR*0.36));
  }
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,sR*0.22,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill();
  ctx.restore();
}

// ─── Fireflies ────────────────────────────────────────────────────────────────
function makeFireflies(W, H, n=30){
  return Array.from({length:n}, ()=>{
    const a=Math.random()*Math.PI*2, d=Math.min(W,H)*0.5*(0.12+Math.random()*0.88);
    return { x:W*0.5+Math.cos(a)*d, y:H*0.5+Math.sin(a)*d,
             vx:(Math.random()-0.5)*0.28, vy:(Math.random()-0.5)*0.20,
             phase:Math.random()*Math.PI*2, speed:0.45+Math.random()*0.85,
             size:1.0+Math.random()*1.5, blinkOut:false, blinkTimer:0, blinkNext:8+Math.random()*20 };
  });
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function PokemonSilk(){
  const canvasRef      = useRef(null);
  const starRef        = useRef(null);
  const spritesRef     = useRef({});
  const stateRef       = useRef({tasks:[],projects:[],recurringInstances:[],popup:null,particles:[],splatters:[]});
  const fliesRef       = useRef([]);
  const animRef        = useRef(null);
  const legPhasesRef   = useRef({});
  const wiggleStateRef = useRef({});
  const spawnTimeRef   = useRef({});
  // Interactive canvas effects
  const webStrands     = useRef([]); // {x1,y1,x2,y2,life,maxLife}
  const webRipples     = useRef([]); // {x,y,r,age,life}

  // ── Persisted state ────────────────────────────────────────────────────────
  const [tasks,    setTasks]    = useState(()=> loadStored("psilk-tasks",    d=>d.map(t=>({...t,deadline:Number(t.deadline)})))    ?? []);
  const [projects, setProjects] = useState(()=> loadStored("psilk-projects", d=>d.map(p=>({...p,deadline:Number(p.deadline)})))    ?? []);
  const [recurringTemplates, setRecurringTemplates] = useState(()=>
    loadStored("psilk-recurring", d=>d.map(t=>({...t,startDeadline:Number(t.startDeadline)}))) ?? []);
  const [recurringHp, setRecurringHp] = useState(()=> loadStored("psilk-recurringHp", d=>d) ?? {});
  const [streaks,     setStreaks]      = useState(()=> loadStored("psilk-streaks",     d=>d) ?? {});
  const [tick, setTick] = useState(0);

  // ── UI state ───────────────────────────────────────────────────────────────
  const [popup,      setPopup]      = useState(null);
  const [activeProj, setActiveProj] = useState(null);
  const [editItem,   setEditItem]   = useState(null);
  const [showForm,   setShowForm]   = useState(null);
  const [confirm,    setConfirm]    = useState(null);

  // Task form
  const [nName,setNName]=useState(""); const [nDate,setNDate]=useState(""); const [nTime,setNTime]=useState("23:59");
  const [nType,setNType]=useState("spinarak"); const [nHp,setNHp]=useState(1); const [nNote,setNNote]=useState("");
  const [nRecurring,setNRecurring]=useState(false); const [nFreq,setNFreq]=useState("weekly"); const [nCount,setNCount]=useState("infinite");
  // Project form
  const [pName,setPName]=useState(""); const [pDate,setPDate]=useState(""); const [pTime,setPTime]=useState("23:59");
  const [pType,setPType]=useState("ariados"); const [pSubtasks,setPSubtasks]=useState([{name:"",maxHp:1}]);

  // Sync refs
  useEffect(()=>{ stateRef.current.tasks=tasks; }, [tasks]);
  useEffect(()=>{ stateRef.current.projects=projects; }, [projects]);
  useEffect(()=>{ stateRef.current.popup=popup; }, [popup]);

  // Persist
  useEffect(()=>{ try{localStorage.setItem("psilk-tasks",    JSON.stringify(tasks));          }catch{} },[tasks]);
  useEffect(()=>{ try{localStorage.setItem("psilk-projects", JSON.stringify(projects));       }catch{} },[projects]);
  useEffect(()=>{ try{localStorage.setItem("psilk-recurring",JSON.stringify(recurringTemplates));}catch{} },[recurringTemplates]);
  useEffect(()=>{ try{localStorage.setItem("psilk-recurringHp",JSON.stringify(recurringHp)); }catch{} },[recurringHp]);
  useEffect(()=>{ try{localStorage.setItem("psilk-streaks",  JSON.stringify(streaks));        }catch{} },[streaks]);

  // 30s tick for recurring refresh; 10min pruning
  useEffect(()=>{ const id=setInterval(()=>setTick(t=>t+1),30000); return()=>clearInterval(id); },[]);
  useEffect(()=>{
    const prune=()=>setRecurringHp(hp=>pruneRecurringHp(hp,recurringTemplates));
    prune();
    const id=setInterval(prune,10*60*1000);
    return()=>clearInterval(id);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[recurringTemplates.length]);

  // Load sprites
  useEffect(()=>{
    [...Object.keys(SPECIES),...Object.keys(BOSS_SPECIES)].forEach(key=>{
      const urls=spriteUrls(key); let idx=0;
      const img=new Image(); img.crossOrigin="anonymous";
      img.onload =()=>{ spritesRef.current[key]=img; };
      img.onerror=()=>{ if(idx<urls.length) img.src=urls[idx++]; };
      img.src=urls[idx++];
    });
  },[]);

  // Expand recurring
  // eslint-disable-next-line react-hooks/exhaustive-deps
  const recurringInstances=useMemo(()=>
    recurringTemplates.flatMap(tmpl=>expandRecurring(tmpl,Date.now(),recurringHp,streaks)),
  [recurringTemplates,recurringHp,streaks,tick]);
  useEffect(()=>{ stateRef.current.recurringInstances=recurringInstances; },[recurringInstances]);

  // ── Helpers ────────────────────────────────────────────────────────────────
  const askConfirm=(message,onConfirm)=>setConfirm({message,onConfirm});

  const cleanupRefs=(id)=>{
    delete spawnTimeRef.current[id];
    delete legPhasesRef.current[id];
    delete wiggleStateRef.current[id];
  };

  const removeTask   =(id)=>{ setTasks(p=>p.filter(t=>t.id!==id));    cleanupRefs(id); setPopup(null); };
  const removeProject=(id)=>{ setProjects(p=>p.filter(x=>x.id!==id)); cleanupRefs(id); setPopup(null); setActiveProj(null); };
  const removeRecurringSeries=(templateId)=>{
    setRecurringTemplates(p=>p.filter(t=>t.id!==templateId));
    setRecurringHp(p=>{const n={...p};Object.keys(n).filter(k=>k.startsWith(templateId+":")).forEach(k=>delete n[k]);return n;});
    setPopup(null);
  };

  const squishAt=(id, type, isProj)=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const W=canvas.offsetWidth, H=canvas.offsetHeight;
    const maxR=Math.min(W,H)*0.42, cx=W*0.50, cy=H*0.50;
    const ent = isProj ? projects.find(p=>p.id===id)
              : (tasks.find(t=>t.id===id) ?? recurringInstances.find(i=>i.id===id));
    if(!ent) return;
    const allEnts=[...tasks,...projects,...recurringInstances];
    const now=Date.now();
    const isOD=ent.deadline<=now;
    const r=getRadius(ent.deadline,now,maxR);
    const pos=isOD?overduePos(ent,allEnts,cx,cy,now):{x:cx+Math.cos(ent.angle)*r,y:cy+Math.sin(ent.angle)*r};
    stateRef.current.particles=[...(stateRef.current.particles||[]),...spawnSquish(pos.x,pos.y,type)];
  };

  // ── Smart angle assignment ─────────────────────────────────────────────────
  // Pick the angle that maximises the minimum angular distance from all existing entities
  const bestAngle = useCallback((existingAngles) => {
    if(existingAngles.length === 0) return Math.random() * Math.PI * 2;
    const CANDIDATES = 32; // test this many evenly-spaced candidates
    let best = 0, bestDist = -1;
    for(let i = 0; i < CANDIDATES; i++){
      const candidate = (i / CANDIDATES) * Math.PI * 2;
      // Minimum angular distance to any existing angle
      const minDist = existingAngles.reduce((min, a) => {
        const d = Math.abs(candidate - a);
        return Math.min(min, d, Math.PI * 2 - d); // wrap-around distance
      }, Math.PI * 2);
      if(minDist > bestDist){ bestDist = minDist; best = candidate; }
    }
    // Add a tiny random jitter so two tasks added at the same time don't land identically
    return best + (Math.random() - 0.5) * 0.15;
  }, []);

  const allAngles = useCallback(() => [
    ...tasks.map(t => t.angle),
    ...projects.map(p => p.angle),
    ...recurringInstances.map(i => i.angle),
  ], [tasks, projects, recurringInstances]);

  // ── Add task ───────────────────────────────────────────────────────────────
  const addTask=useCallback(()=>{
    if(!nName.trim()||!nDate) return;
    const deadline=new Date(`${nDate}T${nTime||"23:59"}`).getTime(); if(isNaN(deadline)) return;
    if(nRecurring){
      setRecurringTemplates(prev=>[...prev,{
        id:`rt_${Date.now()}`, name:nName.trim(), type:nType, maxHp:nHp,
        freq:nFreq, count:nCount, startDeadline:deadline, paused:false, note:nNote.trim(),
      }]);
    } else {
      const id=`t_${Date.now()}`; spawnTimeRef.current[id]=Date.now();
      setTasks(prev=>[...prev,{id, name:nName.trim(), deadline, type:nType,
        angle:bestAngle(allAngles()), maxHp:nHp, hp:nHp, note:nNote.trim()}]);
    }
    setNName(""); setNDate(""); setNTime("23:59"); setNHp(1); setNNote("");
    setNRecurring(false); setNFreq("weekly"); setNCount("infinite"); setShowForm(null);
  },[nName,nDate,nTime,nType,nHp,nNote,nRecurring,nFreq,nCount,bestAngle,allAngles]);

  // ── Add project ────────────────────────────────────────────────────────────
  const addProject=useCallback(()=>{
    if(!pName.trim()||!pDate) return;
    const valid=pSubtasks.filter(s=>s.name.trim()); if(!valid.length) return;
    const deadline=new Date(`${pDate}T${pTime||"23:59"}`).getTime(); if(isNaN(deadline)) return;
    const id=`p_${Date.now()}`; spawnTimeRef.current[id]=Date.now();
    setProjects(prev=>[...prev,{id, name:pName.trim(), deadline, type:pType,
      angle:bestAngle(allAngles()),
      subtasks:valid.map(s=>({id:`st_${Date.now()}_${Math.random()}`,name:s.name.trim(),maxHp:s.maxHp,hp:s.maxHp}))}]);
    setPName(""); setPDate(""); setPTime("23:59"); setPType("ariados"); setPSubtasks([{name:"",maxHp:1}]); setShowForm(null);
  },[pName,pDate,pTime,pType,pSubtasks,bestAngle,allAngles]);

  // ── Save edit ──────────────────────────────────────────────────────────────
  const saveEdit=useCallback(()=>{
    if(!editItem) return;
    if(editItem.kind==="recurring"){
      const deadline=new Date(`${editItem.date}T${editItem.time||"23:59"}`).getTime();
      setRecurringTemplates(prev=>prev.map(t=>t.id===editItem.id?{...t,
        name:editItem.name, type:editItem.type, maxHp:editItem.maxHp,
        freq:editItem.freq, count:editItem.count, startDeadline:deadline,
        note:editItem.note??""
      }:t));
      setEditItem(null); setPopup(null); return;
    }
    const deadline=new Date(`${editItem.date}T${editItem.time||"23:59"}`).getTime();
    if(isNaN(deadline)||!editItem.name.trim()) return;
    if(editItem.kind==="task")
      setTasks(prev=>prev.map(t=>t.id===editItem.id?{...t,name:editItem.name,deadline,type:editItem.type,maxHp:editItem.maxHp,hp:editItem.hp,note:editItem.note??""}:t));
    else
      setProjects(prev=>prev.map(p=>p.id===editItem.id?{...p,name:editItem.name,deadline,type:editItem.type,subtasks:editItem.subtasks}:p));
    setEditItem(null); setPopup(null);
  },[editItem]);

  // ── Bulk squish overdue ────────────────────────────────────────────────────
  const bulkSquishOverdue=useCallback(()=>{
    const now=Date.now();
    const canvas=canvasRef.current;
    const W=canvas?.offsetWidth||800, H=canvas?.offsetHeight||600;
    const maxR=Math.min(W,H)*0.42, cx=W*0.50, cy=H*0.50;
    setTasks(prev=>prev.filter(t=>{
      if(t.deadline>now) return true;
      stateRef.current.particles=[...(stateRef.current.particles||[]),...spawnSquish(cx,cy,t.type)];
      cleanupRefs(t.id); return false;
    }));
    const newHp={...recurringHp}, newStreaks={...streaks};
    for(const inst of recurringInstances){
      if(inst.deadline<=now){
        newHp[inst.id]=0; newStreaks[inst.templateId]=0;
        stateRef.current.particles=[...(stateRef.current.particles||[]),...spawnSquish(cx,cy,inst.type)];
        cleanupRefs(inst.id);
      }
    }
    setRecurringHp(newHp); setStreaks(newStreaks); setPopup(null);
  },[recurringHp,recurringInstances,streaks]);

  // ── Export / Import ────────────────────────────────────────────────────────
  const importRef=useRef(null);
  const exportData=useCallback(()=>{
    const data={tasks,projects,recurringTemplates,recurringHp,streaks,exportedAt:new Date().toISOString(),version:3};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="pokemon-silk-v3-backup.json"; a.click();
    URL.revokeObjectURL(url);
  },[tasks,projects,recurringTemplates,recurringHp,streaks]);

  const importData=useCallback((e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.tasks)               setTasks(data.tasks.map(t=>({...t,deadline:Number(t.deadline)})));
        if(data.projects)            setProjects(data.projects.map(p=>({...p,deadline:Number(p.deadline)})));
        if(data.recurringTemplates)  setRecurringTemplates(data.recurringTemplates.map(t=>({...t,startDeadline:Number(t.startDeadline)})));
        if(data.recurringHp)         setRecurringHp(data.recurringHp);
        if(data.streaks)             setStreaks(data.streaks);
        setConfirm(null);
      }catch{ alert("Invalid backup file."); }
    };
    reader.readAsText(file); e.target.value="";
  },[]);

  // ── Canvas click ───────────────────────────────────────────────────────────
  const handleClick=useCallback((e)=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const W=canvas.offsetWidth, H=canvas.offsetHeight;
    const maxR=Math.min(W,H)*0.42, cx=W*0.50, cy=H*0.50;
    const now=Date.now();
    const isTouchDevice=window.innerWidth<600;
    const hitR=isTouchDevice?38:28, hitRProj=isTouchDevice?44:34;
    const distToCenter=Math.hypot(mx-cx, my-cy);
    const allEnts=[...(stateRef.current.recurringInstances||[]),...stateRef.current.tasks,...stateRef.current.projects];

    // Check entities first
    for(const inst of (stateRef.current.recurringInstances||[])){
      const r=getRadius(inst.deadline,now,maxR);
      const isOD=inst.deadline<=now;
      const pos=isOD?overduePos(inst,allEnts,cx,cy,now):{x:cx+Math.cos(inst.angle)*r,y:cy+Math.sin(inst.angle)*r};
      if(Math.hypot(mx-pos.x,my-pos.y)<hitR){
        setPopup({kind:"recurring",id:inst.id,templateId:inst.templateId,occIdx:inst.occIdx,x:pos.x+rect.left,y:pos.y+rect.top});
        setActiveProj(null); return;
      }
    }
    for(const t of stateRef.current.tasks){
      const r=getRadius(t.deadline,now,maxR);
      const isOD=t.deadline<=now;
      const pos=isOD?overduePos(t,allEnts,cx,cy,now):{x:cx+Math.cos(t.angle)*r,y:cy+Math.sin(t.angle)*r};
      if(Math.hypot(mx-pos.x,my-pos.y)<hitR){
        setPopup({kind:"task",id:t.id,x:pos.x+rect.left,y:pos.y+rect.top});
        setActiveProj(null); return;
      }
    }
    for(const p of stateRef.current.projects){
      const r=getRadius(p.deadline,now,maxR);
      const isOD=p.deadline<=now;
      const pos=isOD?overduePos(p,allEnts,cx,cy,now):{x:cx+Math.cos(p.angle)*r,y:cy+Math.sin(p.angle)*r};
      if(Math.hypot(mx-pos.x,my-pos.y)<hitRProj){
        setPopup({kind:"project",id:p.id,x:pos.x+rect.left,y:pos.y+rect.top});
        setActiveProj(id=>id===p.id?null:p.id); return;
      }
    }

    setPopup(null);

    // Click on web (within maxR) — ripple from click point
    if(distToCenter<=maxR){
      webRipples.current.push({x:mx, y:my, r:Math.min(maxR, distToCenter+60), age:0, life:1.4});
    }

    // Click on empty space (outside web) — shoot silk strand toward web center
    if(distToCenter>maxR){
      const angle=Math.atan2(cy-my, cx-mx); // toward center, not away
      const tx=mx+Math.cos(angle)*(distToCenter-maxR*0.08);
      const ty=my+Math.sin(angle)*(distToCenter-maxR*0.08);
      webStrands.current.push({x1:mx,y1:my,x2:tx,y2:ty,life:1,maxLife:1.6});
    }
  },[]);

  // ── Animation loop ─────────────────────────────────────────────────────────
  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    let time=0, lastT=performance.now();
    const shooters=[]; let nextShooter=5+Math.random()*10;
    const starTwinkles=Array.from({length:280},()=>Math.random()*Math.PI*2);

    const resize=()=>{
      const dpr=window.devicePixelRatio||1;
      canvas.width=canvas.offsetWidth*dpr; canvas.height=canvas.offsetHeight*dpr;
      ctx.scale(dpr,dpr);
      starRef.current=buildStarField(canvas.offsetWidth,canvas.offsetHeight);
      fliesRef.current=makeFireflies(canvas.offsetWidth,canvas.offsetHeight);
    };
    resize(); window.addEventListener("resize",resize);

    const loop=(now)=>{
      const dt=Math.min((now-lastT)/1000,0.05); lastT=now; time+=dt;
      const W=canvas.offsetWidth, H=canvas.offsetHeight;
      const maxR=Math.min(W,H)*0.42, cx=W*0.50, cy=H*0.50;
      const tNow=Date.now();
      const ts=stateRef.current.tasks, ps=stateRef.current.projects;
      const ri=stateRef.current.recurringInstances||[], pop=stateRef.current.popup;

      // Background
      if(starRef.current){ ctx.imageSmoothingEnabled=false; ctx.drawImage(starRef.current,0,0,W,H); }
      drawAurora(ctx,W,H,time);

      // Twinkling stars
      const rng2=seededRng(137);
      for(let i=0;i<280;i++){
        const sx=rng2()*W,sy=rng2()*H,b=rng2(); rng2();
        if(b>0.80){
          const tw=0.50+0.50*Math.sin(starTwinkles[i]+time*(0.35+b*0.75));
          ctx.fillStyle=`rgba(255,255,255,${(0.40+b*0.60)*tw*0.55})`;
          ctx.fillRect(Math.round(sx),Math.round(sy),b>0.96?2:1,b>0.96?2:1);
        }
      }

      // Shooting stars
      nextShooter-=dt;
      if(nextShooter<=0){
        const ang=(18+Math.random()*28)*Math.PI/180, spd=300+Math.random()*240;
        shooters.push({x:Math.random()*W*0.55,y:Math.random()*H*0.25,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,len:70+Math.random()*90});
        nextShooter=7+Math.random()*14;
      }
      for(let i=shooters.length-1;i>=0;i--){
        const sh=shooters[i]; sh.x+=sh.vx*dt; sh.y+=sh.vy*dt; sh.life-=dt*1.6;
        if(sh.life<=0||sh.x>W||sh.y>H){shooters.splice(i,1);continue;}
        const a2=Math.atan2(sh.vy,sh.vx);
        const tx2=sh.x-Math.cos(a2)*sh.len*sh.life, ty2=sh.y-Math.sin(a2)*sh.len*sh.life;
        const sg=ctx.createLinearGradient(tx2,ty2,sh.x,sh.y);
        sg.addColorStop(0,"rgba(255,255,255,0)"); sg.addColorStop(0.6,`rgba(220,228,255,${sh.life*0.32})`); sg.addColorStop(1,`rgba(255,255,255,${sh.life*0.88})`);

        ctx.beginPath(); ctx.arc(sh.x,sh.y,1.1*sh.life,0,Math.PI*2); ctx.fillStyle=`rgba(240,242,255,${sh.life*0.92})`; ctx.fill();
      }

      // Fireflies
      for(const f of fliesRef.current){
        f.blinkTimer+=dt;
        if(!f.blinkOut&&f.blinkTimer>f.blinkNext){f.blinkOut=true;f.blinkTimer=0;f.blinkNext=0.3+Math.random()*0.8;}
        if(f.blinkOut&&f.blinkTimer>f.blinkNext){
          f.blinkOut=false;f.blinkTimer=0;f.blinkNext=8+Math.random()*20;
          f.x+=(Math.random()-0.5)*55;f.y+=(Math.random()-0.5)*55;
        }
        if(f.blinkOut) continue;
        f.x+=f.vx;f.y+=f.vy;
        f.vx+=(Math.random()-0.5)*0.026;f.vy+=(Math.random()-0.5)*0.018;
        f.vx=Math.max(-0.44,Math.min(0.44,f.vx));f.vy=Math.max(-0.32,Math.min(0.32,f.vy));
        const ddx=cx-f.x,ddy=cy-f.y;

        f.phase+=dt*f.speed;

        ctx.fillStyle=fg;ctx.beginPath();ctx.arc(f.x,f.y,f.size*10,0,Math.PI*2);ctx.fill();

        const alpha=s.life*0.55;
        const sg=ctx.createLinearGradient(s.x1,s.y1,s.x2,s.y2);

      // Splatters

        sp.age+=dt; const alpha=Math.max(0,1-sp.age/sp.life); if(alpha<=0) return false;
        ctx.save();ctx.globalAlpha=alpha*0.50;ctx.fillStyle=sp.color;

      });

      stateRef.current.particles=(stateRef.current.particles||[]).filter(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.09;p.life-=dt*1.8;

      // ── Render entity ──────────────────────────────────────────────────────
      const renderEnt=(ent,isProj)=>{
        if(!legPhasesRef.current[ent.id])   legPhasesRef.current[ent.id]  =Math.random()*Math.PI*2;

        const cd=overdue?"OVERDUE":formatCountdown(ms);
        const hpTxt=isProj?`${projectCurrentHp(ent)}/${projectMaxHp(ent)} HP`:null;

      ps.forEach(p=>renderEnt(p,true));

      const vig=ctx.createRadialGradient(cx,cy,maxR*0.40,cx,cy,Math.max(W,H)*0.82);
